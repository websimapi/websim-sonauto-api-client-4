<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonauto API Client</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "./js/app.js": "./js/app.js",
                "./js/api.js": "./js/api.js",
                "./js/ui.js": "./js/ui.js"
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Sonauto API Client</h1>
            <p>A simple interface to generate music with the Sonauto API.</p>
        </header>

        <main class="tabs">
            <nav class="tab-nav">
                <button class="tab-link active" data-tab="generate">Generate Song</button>
                <button class="tab-link" data-tab="status">Check Status</button>
            </nav>

            <div id="generate" class="tab-content active">
                <h3>Generate a new song</h3>
                <form id="generate-form">
                    <div class="form-group">
                        <label for="prompt">Prompt</label>
                        <textarea id="prompt" rows="3" placeholder="e.g., An upbeat rock song with heavy guitar riffs"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="tags">Tags (comma-separated)</label>
                        <input type="text" id="tags" placeholder="e.g., rock, energetic, 80s">
                    </div>
                    <div class="form-group">
                        <label for="lyrics">Lyrics</label>
                        <textarea id="lyrics" rows="5" placeholder="Enter lyrics here, or leave blank for AI to generate them."></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="num-songs">Number of Songs</label>
                            <select id="num-songs">
                                <option value="1">1 (100 credits)</option>
                                <option value="2">2 (150 credits)</option>
                            </select>
                        </div>
                         <div class="form-group">
                            <label for="output-format">Output Format</label>
                            <select id="output-format">
                                <option value="ogg">ogg</option>
                                <option value="mp3">mp3</option>
                                <option value="wav">wav</option>
                                <option value="flac">flac</option>
                                <option value="m4a">m4a</option>
                            </select>
                        </div>
                        <div class="form-group checkbox-group">
                             <input type="checkbox" id="instrumental">
                            <label for="instrumental">Instrumental</label>
                        </div>
                    </div>
                    <button type="submit" id="generate-btn">Generate</button>
                </form>
            </div>

            <div id="status" class="tab-content">
                <h3>Check Generation Status</h3>
                <form id="status-form">
                    <div class="form-group">
                        <label for="task-id">Task ID</label>
                        <input type="text" id="task-id" placeholder="Enter the task ID of a generation">
                    </div>
                    <button type="submit" id="check-status-btn">Check Status</button>
                </form>
            </div>
        </main>
        
        <section class="results-section">
            <h2>Results</h2>
            <div id="results-log">
                <p>Results will appear here...</p>
            </div>
        </section>
    </div>

    <script type="module" src="./js/app.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
